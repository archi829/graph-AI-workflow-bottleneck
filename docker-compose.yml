services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    # Talks to Langfuse via LANGFUSE_HOST in .env -- either Langfuse Cloud
    # or a self-hosted stack Person B runs separately. See README.md,
    # "Langfuse: a heads-up" section, for why this isn't bundled here.

